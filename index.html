<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte Interactive</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;display:flex;height:100vh;overflow:hidden}
#map{flex:1;height:100vh;background:#f5f5f5}
#sidebar{width:380px;background:#1a1a2e;color:#eee;padding:10px;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
h2{font-size:12px;color:#fff;text-align:center;margin-bottom:3px}
.bar{background:#0f3460;border-radius:5px;padding:5px 8px;margin-bottom:3px;display:flex;justify-content:space-around;text-align:center}
.bar div{flex:1}.bar .val{font-size:13px;font-weight:800}
.bar .g{color:#2ecc71}.bar .b{color:#3498db}.bar .lbl{font-size:7px;color:#999}
.c{background:#16213e;border-radius:5px;padding:6px 8px;border-left:4px solid;display:flex;align-items:center;gap:6px;cursor:pointer}
.c:hover{background:#1a1a3e}.c.sel{background:#1a2744}
.c .dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.c .name{font-size:10px;font-weight:600;cursor:pointer;padding:1px 3px;border-radius:3px}
.c .name:hover{background:#ffffff15}
.c .name input{background:#ffffff15;border:1px solid #ffffff44;color:#fff;font-size:10px;font-weight:600;padding:1px 3px;border-radius:3px;width:100%;outline:none}
.c .info{flex:1;min-width:0}.c .dc{font-size:7px;color:#999}
.c .nums{text-align:right;white-space:nowrap}.c .pot{font-size:9px;font-weight:700}
.c .sales{font-size:8px;color:#2ecc71}.c .ratio{font-size:7px;color:#f39c12}
.c .del{background:none;border:none;color:#e94560;cursor:pointer;font-size:14px;padding:0 3px;line-height:1;opacity:.6}
.btn-row{display:flex;gap:4px;margin:3px 0}
.btn{background:#e94560;color:#fff;border:none;padding:5px;border-radius:5px;cursor:pointer;font-size:10px;font-weight:600;flex:1}.btn:hover{opacity:.85}
.btn.bl{background:#3498db}.btn.grn{background:#27ae60}.btn.org{background:#e67e22}
.leg{font-size:7px;color:#888;text-align:center;margin-top:2px;line-height:1.3}
.ur{background:#333;border-radius:5px;padding:5px 8px;display:flex;align-items:center;gap:6px;margin-top:3px;justify-content:space-between}
.tst{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#27ae60;color:#fff;padding:7px 18px;border-radius:20px;font-size:11px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s}
.tst.show{opacity:1}
#loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a1a2e;color:#fff;padding:15px 30px;border-radius:10px;font-size:14px;z-index:99999}
</style>
</head>
<body>
<div id="loading">Chargement...</div>
<div id="map"></div>
<div id="sidebar">
<h2 id="acnt">Chargement...</h2>
<div class="bar"><div><div class="lbl">POTENTIEL</div><div class="val" id="tp">-</div></div><div><div class="lbl">CA 2025</div><div class="val g" id="ts">-</div></div><div><div class="lbl">RATIO</div><div class="val b" id="tr">-</div></div></div>
<div class="btn-row"><button class="btn" onclick="rst()">Reinit.</button><button class="btn bl" onclick="addA()">+ Agent</button><button class="btn grn" onclick="sv()">Sauvegarder</button><button class="btn org" onclick="cp()">Copier lien</button></div>
<div id="ac"></div>
<div class="ur" id="ur" style="display:none"><span style="font-size:8px;color:#999">Non assigne</span><span style="font-size:9px;font-weight:700" id="up">0</span></div>
<div class="leg">Sauvegarder = memorise navigateur<br>Copier lien = lien partageable</div></div>
<div class="tst" id="tst">Lien copie!</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var DC=["#E6194B", "#3CB44B", "#FFE119", "#4363D8", "#F58231", "#911EB4", "#46F0F0", "#F032E6", "#BCF60C", "#FABEBE", "#008080", "#E6BEFF", "#AAFFC3", "#FFD8B1", "#808000", "#000080", "#DCBEFF", "#A9A9A9", "#800000", "#469990"];
var AG_DEF=[{"id": 0, "name": "Agent 1", "color": "#E6194B", "potential": 663149, "sales": 49950}, {"id": 1, "name": "Agent 2", "color": "#3CB44B", "potential": 744463, "sales": 276023}, {"id": 2, "name": "Agent 3", "color": "#FFE119", "potential": 693927, "sales": 323601}, {"id": 3, "name": "Agent 4", "color": "#4363D8", "potential": 721746, "sales": 207626}, {"id": 4, "name": "Agent 5", "color": "#F58231", "potential": 530534, "sales": 178967}, {"id": 5, "name": "Agent 6", "color": "#911EB4", "potential": 657266, "sales": 38612}, {"id": 6, "name": "Agent 7", "color": "#46F0F0", "potential": 548324, "sales": 132049}, {"id": 7, "name": "Agent 8", "color": "#F032E6", "potential": 416578, "sales": 20754}, {"id": 8, "name": "Agent 9", "color": "#BCF60C", "potential": 351895, "sales": 98179}, {"id": 9, "name": "Agent 10", "color": "#FABEBE", "potential": 382963, "sales": 9847}, {"id": 10, "name": "Agent 11", "color": "#008080", "potential": 225175, "sales": 11158}];
var AG=JSON.parse(JSON.stringify(AG_DEF));
var BA=JSON.parse(JSON.stringify(AG_DEF));
var GEO=null, GL=null, map=null, sel=null, ed=null, IN={};

function fmt(n){return String(n).replace(/\B(?=(\d{3})+(?!\d))/g,' ')}
function gc(id){if(id===null||id===undefined)return'#666';var a=AG.find(function(x){return x.id===id});return a?a.color:'#666'}
function sf(f){return{fillColor:gc(f.properties.agent),weight:1,opacity:1,color:'#333',fillOpacity:.65}}

function init(){
    map=L.map('map',{center:[46.7,2.2],zoom:6,minZoom:5,maxZoom:9,zoomControl:true,attributionControl:false});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
    GL=L.geoJSON(GEO,{style:sf,onEachFeature:function(f,l){var p=f.properties;var ag=AG.find(function(a){return a.id===p.agent});var pot=p.potential||0;var s25=p.sales2025||0;var r=s25>0&&pot>0?Math.round(s25/pot*100):0;l.bindTooltip('<div style="font-size:11px;line-height:1.3"><b>'+p.dept_name+' ('+p.code+')</b><br>Pot: '+fmt(pot)+' EUR<br>CA25: '+fmt(s25)+' EUR<br>Ratio: '+r+'%<br>'+(ag?ag.name:'Aucun')+'</div>',{sticky:true,direction:'top'});l.on('click',function(){var ca=p.agent;var na;if(sel!==null&&sel!==ca){na=sel}else{var ids=AG.map(function(a){return a.id}).sort(function(a,b){return a-b});if(ids.length===0)na=null;else if(ca===null||ca===undefined)na=ids[0];else{var idx=ids.indexOf(ca);na=ids[(idx+1)%ids.length]}}p.agent=na;GL.resetStyle(l);upd()})}}).addTo(map);
    map.fitBounds(GL.getBounds().pad(.05));
    document.getElementById('loading').style.display='none';
    upd();
}

function upd(){var at={},ad={},ats={},up=0,uc=0;GEO.features.forEach(function(f){var a=f.properties.agent;var p=f.properties.potential||0;var s=f.properties.sales2025||0;if(a===null||a===undefined){up+=p;uc++;return}if(!at[a]){at[a]=0;ad[a]=0;ats[a]=0}at[a]+=p;ad[a]++;ats[a]+=s});var tP=Object.values(at).reduce(function(s,v){return s+v},0)+up;var tS=Object.values(ats).reduce(function(s,v){return s+v},0);var tR=tP>0?Math.round(tS/tP*100):0;document.getElementById('tp').textContent=fmt(Math.round(tP))+' EUR';document.getElementById('ts').textContent=fmt(Math.round(tS))+' EUR';document.getElementById('tr').textContent=tR+'%';document.getElementById('acnt').textContent=AG.length+' agents';var ur=document.getElementById('ur');if(uc>0){ur.style.display='flex';document.getElementById('up').textContent=fmt(Math.round(up))+' EUR ('+uc+' dpts)'}else{ur.style.display='none'}var c=document.getElementById('ac');c.innerHTML='';AG.forEach(function(agent){var p=at[agent.id]||0;var n=ad[agent.id]||0;var sa=ats[agent.id]||0;var ra=p>0?Math.round(sa/p*100):0;var s=sel===agent.id;var ie=ed===agent.id;var card=document.createElement('div');card.className='c'+(s?' sel':'');card.style.borderLeftColor=agent.color;var dot=document.createElement('div');dot.className='dot';dot.style.background=agent.color;var info=document.createElement('div');info.className='info';var name=document.createElement('div');name.className='name';if(ie){var inp=document.createElement('input');inp.value=agent.name;inp.onkeydown=function(e){if(e.key==='Enter'){agent.name=inp.value.trim()||agent.name;ed=null;upd()}if(e.key==='Escape'){ed=null;upd()}};inp.onblur=function(){agent.name=inp.value.trim()||agent.name;ed=null;upd()};name.appendChild(inp);setTimeout(function(){inp.focus();inp.select()},10)}else{name.textContent=agent.name;name.onclick=function(e){e.stopPropagation();ed=agent.id;upd()}}var cnt=document.createElement('div');cnt.className='dc';cnt.textContent=n+' dpts';info.appendChild(name);info.appendChild(cnt);var nums=document.createElement('div');nums.className='nums';nums.innerHTML='<div class="pot">'+fmt(Math.round(p))+' EUR</div><div class="sales">CA25: '+fmt(Math.round(sa))+' EUR</div><div class="ratio">'+ra+'%</div>';var del=document.createElement('button');del.className='del';del.textContent='X';del.onclick=function(e){e.stopPropagation();if(!confirm('Supprimer?'))return;AG=AG.filter(function(a){return a.id!==agent.id});GEO.features.forEach(function(f){if(f.properties.agent===agent.id)f.properties.agent=null});if(sel===agent.id)sel=null;if(ed===agent.id)ed=null;upd()};card.appendChild(dot);card.appendChild(info);card.appendChild(nums);card.appendChild(del);card.onclick=function(e){if(e.target===card||e.target===dot||e.target.className==='pot'||e.target.className==='sales'||e.target.className==='ratio'||e.target.className==='nums'||e.target.className==='info'||e.target.className==='dc'){sel=(sel===agent.id)?null:agent.id;upd()}};c.appendChild(card)});GL.eachLayer(function(l){GL.resetStyle(l)})}
function addA(){var nid=AG.length>0?Math.max.apply(null,AG.map(function(a){return a.id}))+1:0;var ci=nid%DC.length;AG.push({id:nid,name:'Agent '+(nid+1),color:DC[ci],sales:0});upd()}
function rst(){if(!confirm('Reinitialiser ?'))return;sel=null;ed=null;GEO.features.forEach(function(f){f.properties.agent=IN[f.properties.code]});AG=JSON.parse(JSON.stringify(BA));upd()}
function sv(){var da={};GEO.features.forEach(function(f){da[f.properties.code]=f.properties.agent});var st={agents:AG,deptAss:da,at:new Date().toISOString()};localStorage.setItem('fm',JSON.stringify(st));var t=document.getElementById('tst');t.textContent='Sauvegarde locale!';t.classList.add('show');setTimeout(function(){t.classList.remove('show')},1500)}
function cp(){var da={};GEO.features.forEach(function(f){da[f.properties.code]=f.properties.agent});var st={agents:AG,deptAss:da};var url=window.location.origin+window.location.pathname+'#s='+btoa(JSON.stringify(st));navigator.clipboard.writeText(url).then(function(){var t=document.getElementById('tst');t.textContent='Lien copie!';t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000)}).catch(function(){prompt('Copiez:',url)})}

// Load state from hash
function lh(){
    try{
        var h=window.location.hash.slice(1);
        if(!h||h.indexOf('s=')!==0)return false;
        var st=JSON.parse(atob(h.slice(2)));
        if(st.agents&&st.agents.length>0)AG=st.agents;
        if(st.deptAss&&GEO)GEO.features.forEach(function(f){var c=f.properties.code;if(c in st.deptAss)f.properties.agent=st.deptAss[c]});
        return true;
    }catch(e){return false}
}
function ll(){try{var s=localStorage.getItem('fm');if(s){var st=JSON.parse(s);if(st.agents&&st.agents.length>0)AG=st.agents;if(st.deptAss&&GEO)GEO.features.forEach(function(f){var c=f.properties.code;if(c in st.deptAss)f.properties.agent=st.deptAss[c]});return true}}catch(e){}return false}

// Main flow: fetch GeoJSON, then init
document.getElementById('acnt').textContent='Telechargement des donnees...';
fetch('data.geojson').then(function(r){return r.json()}).then(function(d){
    GEO=d;
    IN={};GEO.features.forEach(function(f){IN[f.properties.code]=f.properties.agent});
    lh()||ll(); // Apply saved state
    init();
}).catch(function(e){
    document.getElementById('loading').textContent='Erreur: '+e.message;
    document.getElementById('acnt').textContent='ERREUR chargement';
});
</script>
</body>
</html>
