<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte Interactive</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;display:flex;height:100vh;overflow:hidden}
#map{flex:1;height:100vh}
#sidebar{width:380px;background:#1a1a2e;color:#eee;padding:12px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
h2{font-size:13px;color:#fff;text-align:center;margin-bottom:4px}
.totals-bar{background:#0f3460;border-radius:5px;padding:6px 8px;margin-bottom:4px;display:flex;justify-content:space-around;text-align:center}
.totals-bar div{flex:1}
.totals-bar .val{font-size:14px;font-weight:800}
.totals-bar .val.green{color:#2ecc71}
.totals-bar .val.blue{color:#3498db}
.totals-bar .lbl{font-size:8px;color:#999}
.card{background:#16213e;border-radius:5px;padding:7px 10px;border-left:4px solid;display:flex;align-items:center;gap:7px;cursor:pointer;transition:background .15s}
.card:hover{background:#1a1a3e}
.card.sel{background:#1a2744}
.card .dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.card .name{font-size:10px;font-weight:600;cursor:pointer;padding:1px 3px;border-radius:3px}
.card .name:hover{background:#ffffff15}
.card .name input{background:#ffffff15;border:1px solid #ffffff44;color:#fff;font-size:10px;font-weight:600;padding:1px 3px;border-radius:3px;width:100%;outline:none}
.card .info{flex:1;min-width:0}
.card .dept-count{font-size:7px;color:#999}
.card .nums{text-align:right;white-space:nowrap}
.card .pot{font-size:10px;font-weight:700}
.card .sales{font-size:9px;color:#2ecc71}
.card .ratio{font-size:8px;color:#f39c12}
.card .del{background:none;border:none;color:#e94560;cursor:pointer;font-size:15px;padding:0 3px;line-height:1;opacity:.6}
.card .del:hover{opacity:1}
.btn-row{display:flex;gap:5px;margin:4px 0}
.btn{background:#e94560;color:#fff;border:none;padding:6px;border-radius:5px;cursor:pointer;font-size:10px;font-weight:600;flex:1;transition:background .2s}
.btn:hover{opacity:.85}
.btn.blue{background:#3498db}
.btn.grn{background:#27ae60}
.btn.org{background:#e67e22}
.leg{font-size:7px;color:#888;text-align:center;margin-top:3px;line-height:1.3}
.ur{background:#333;border-radius:5px;padding:5px 8px;display:flex;align-items:center;gap:6px;margin-top:3px;justify-content:space-between}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#27ae60;color:#fff;padding:8px 20px;border-radius:20px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div id="map"></div>
<div id="sidebar">
    <h2 id="agent-count"></h2>
    <div class="totals-bar">
        <div><div class="lbl">POTENTIEL</div><div class="val" id="total-pot">0</div></div>
        <div><div class="lbl">CA 2025</div><div class="val green" id="total-sales">0</div></div>
        <div><div class="lbl">RATIO</div><div class="val blue" id="total-ratio">0%</div></div>
    </div>
    <div class="btn-row">
        <button class="btn" onclick="resetAll()">Reinit.</button>
        <button class="btn blue" onclick="addAgent()">+ Agent</button>
        <button class="btn grn" onclick="doSave()">Sauvegarder</button>
        <button class="btn org" onclick="doCopy()">Copier lien</button>
    </div>
    <div id="ac"></div>
    <div class="ur" id="ur" style="display:none"><span style="font-size:9px;color:#999">Non assigne</span><span class="pot" id="up" style="font-size:10px;font-weight:700">0</span></div>
    <div class="leg">Sauvegarder = memorise dans le navigateur<br>Copier lien = lien partageable avec etat actuel</div>
</div>
<div class="toast" id="toast">Lien copie ! Partagez-le.</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const DEF_AG=[{"id": 0, "name": "Agent 1", "color": "#E6194B", "potential": 663149, "sales": 49950}, {"id": 1, "name": "Agent 2", "color": "#3CB44B", "potential": 744463, "sales": 276023}, {"id": 2, "name": "Agent 3", "color": "#FFE119", "potential": 693927, "sales": 323601}, {"id": 3, "name": "Agent 4", "color": "#4363D8", "potential": 721746, "sales": 207626}, {"id": 4, "name": "Agent 5", "color": "#F58231", "potential": 530534, "sales": 178967}, {"id": 5, "name": "Agent 6", "color": "#911EB4", "potential": 657266, "sales": 38612}, {"id": 6, "name": "Agent 7", "color": "#46F0F0", "potential": 548324, "sales": 132049}, {"id": 7, "name": "Agent 8", "color": "#F032E6", "potential": 416578, "sales": 20754}, {"id": 8, "name": "Agent 9", "color": "#BCF60C", "potential": 351895, "sales": 98179}, {"id": 9, "name": "Agent 10", "color": "#FABEBE", "potential": 382963, "sales": 9847}, {"id": 10, "name": "Agent 11", "color": "#008080", "potential": 225175, "sales": 11158}];
const DEF_COL=["#E6194B", "#3CB44B", "#FFE119", "#4363D8", "#F58231", "#911EB4", "#46F0F0", "#F032E6", "#BCF60C", "#FABEBE", "#008080", "#E6BEFF", "#AAFFC3", "#FFD8B1", "#808000", "#000080", "#DCBEFF", "#A9A9A9", "#800000", "#469990"];
let GEO=null;

fetch('data.geojson').then(function(r){return r.json()}).then(function(d){
    GEO=d;
    INIT={};GEO.features.forEach(function(f){INIT[f.properties.code]=f.properties.agent});
    initMap();
});

function fmt(n){return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ')}
let AG=JSON.parse(JSON.stringify(DEF_AG));
let sel=null;let ed=null;
let GL=null,map=null;

function initMap(){
map=L.map('map',{center:[46.7,2.2],zoom:6,minZoom:5,maxZoom:9,zoomControl:true,attributionControl:false});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
function gc(id){if(id===null||id===undefined)return'#666';var a=AG.find(function(x){return x.id===id});return a?a.color:'#666'}
function sf(f){return{fillColor:gc(f.properties.agent),weight:1,opacity:1,color:'#333',fillOpacity:.65}}
GL=L.geoJSON(GEO,{style:sf,onEachFeature:function(f,l){var p=f.properties;var ag=AG.find(function(a){return a.id===p.agent});var pot=p.potential||0;var s25=p.sales2025||0;var r=s25>0&&pot>0?Math.round(s25/pot*100):0;l.bindTooltip('<div style="font-size:11px;line-height:1.4"><strong>'+p.dept_name+' ('+p.code+')</strong><br>Potentiel: '+fmt(pot)+' EUR<br>CA 2025: '+fmt(s25)+' EUR<br>Ratio: '+r+'%<br>'+(ag?ag.name:'Aucun')+'</div>',{sticky:true,direction:'top'});l.on('click',function(){var ca=p.agent;var na;if(sel!==null&&sel!==ca){na=sel}else{var ids=AG.map(function(a){return a.id}).sort(function(a,b){return a-b});if(ids.length===0){na=null}else if(ca===null||ca===undefined){na=ids[0]}else{var idx=ids.indexOf(ca);na=ids[(idx+1)%ids.length]}}p.agent=na;GL.resetStyle(l);upd()})}}).addTo(map);map.fitBounds(GL.getBounds().pad(.05));
loadFromHash()||loadFromLocal();upd()}

// LZ-String compression (minimal)
var LZString={_keyStr:"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=",compressToEncodedURIComponent:function(e){if(e===null)return"";var i="",n,o,t=0;for(;t<e.length;){var a=e.charCodeAt(t);if(a<128)i+=String.fromCharCode(a),t++;else if(a>191&&a<224)o=e.charCodeAt(t+1),i+=String.fromCharCode((a&31)<<6|o&63),t+=2;else{o=e.charCodeAt(t+1);var u=e.charCodeAt(t+2);i+=String.fromCharCode((a&15)<<12|(o&63)<<6|u&63),t+=3}}return this._compress(i,6,function(e){return"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_~".charAt(e)})},_compress:function(e,i,n){if(e===null)return"";var o,t,a,u={},r={},s="",l="",c="",f=2,d=3,h=2,p=[],g=0,m=0;for(a=0;a<e.length;a+=1)if(l=e.charAt(a),Object.prototype.hasOwnProperty.call(u,l)||(u[l]=d++,r[l]=!0),c=s+l,Object.prototype.hasOwnProperty.call(u,c))s=c;else{if(Object.prototype.hasOwnProperty.call(r,s)){if(s.charCodeAt(0)<256){for(o=0;o<h;o++)g<<=1,m==i-1?(m=0,p.push(n(g)),g=0):m++;t=s.charCodeAt(0);for(o=0;o<8;o++)g=g<<1|t&1,m==i-1?(m=0,p.push(n(g)),g=0):m++,t>>=1}else{t=1;for(o=0;o<h;o++)g=g<<1|t,m==i-1?(m=0,p.push(n(g)),g=0):m++,t=0;t=s.charCodeAt(0);for(o=0;o<16;o++)g=g<<1|t&1,m==i-1?(m=0,p.push(n(g)),g=0):m++,t>>=1}f--,f==0&&(f=Math.pow(2,h),h++),delete r[s]}else for(t=u[s],o=0;o<h;o++)g=g<<1|t&1,m==i-1?(m=0,p.push(n(g)),g=0):m++,t>>=1;f--,f==0&&(f=Math.pow(2,h),h++),u[c]=d++,s=String(l)}if(s!==""){if(Object.prototype.hasOwnProperty.call(r,s)){if(s.charCodeAt(0)<256){for(o=0;o<h;o++)g<<=1,m==i-1?(m=0,p.push(n(g)),g=0):m++;t=s.charCodeAt(0);for(o=0;o<8;o++)g=g<<1|t&1,m==i-1?(m=0,p.push(n(g)),g=0):m++,t>>=1}else{t=1;for(o=0;o<h;o++)g=g<<1|t,m==i-1?(m=0,p.push(n(g)),g=0):m++,t=0;t=s.charCodeAt(0);for(o=0;o<16;o++)g=g<<1|t&1,m==i-1?(m=0,p.push(n(g)),g=0):m++,t>>=1}f--,f==0&&(f=Math.pow(2,h),h++),delete r[s]}else for(t=u[s],o=0;o<h;o++)g=g<<1|t&1,m==i-1?(m=0,p.push(n(g)),g=0):m++,t>>=1;f--,f==0&&(f=Math.pow(2,h),h++)}t=2;for(o=0;o<h;o++)g=g<<1|t&1,m==i-1?(m=0,p.push(n(g)),g=0):m++,t>>=1;for(;;){if(g<<=1,m==i-1){p.push(n(g));break}m++}return p.join("")},decompressFromEncodedURIComponent:function(e){return e==null?"":(e=e.replace(/ /g,"+"),this._decompress(e.length,32,function(i){return"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_~".indexOf(e.charAt(i))}))},_decompress:function(e,i,n){var o,t,a,u,r,s,l=new Array(4096),c=new Array(4096),f=256,d=1,h=i,p=0,g="",m=[g],v=0,w=n(0),b=i;for(t=0;t<f;t++)l[t]=String.fromCharCode(t);for(a=0;a<e;a++){for(o=v+h;o<=b;){v++,p|=n(v)<<b,b+=i}var x=p&o-1;p>>=Math.ceil(Math.log2(o)),b-=Math.ceil(Math.log2(o)),u=x;if(u<f){p&1&&(u!==0?(u=d,d++):d<4096&&(u=d,d++));var C=s}if(u===d){p|=n(v)<<b;var y=p&(d<256?255:d<65536?65535:16777215);p>>=Math.ceil(Math.log2(d<256?256:d<65536?65536:16777216)),b-=Math.ceil(Math.log2(d<256?256:d<65536?65536:16777216)),u=y,l[d]=l[s]+l[s].charAt(0),c[d]=s,d++;var C=s}else C=l[u];if(u>f||d>=4096||C===void 0)return g;m.push(C),g+=C,r=s,s=u,r<f&&(l[d]=l[r]+C.charAt(0),c[d]=r,d++)}return g}};

function loadFromHash(){try{var h=window.location.hash.slice(1);if(!h)return false;var st=JSON.parse(LZString.decompressFromEncodedURIComponent(h));if(st.agents&&st.agents.length>0)AG=st.agents;if(st.deptAssignments)GEO.features.forEach(function(f){var c=f.properties.code;if(c in st.deptAssignments)f.properties.agent=st.deptAssignments[c]});return true}catch(e){return false}}
function loadFromLocal(){try{var s=localStorage.getItem('fillmed_map');if(s){var st=JSON.parse(s);if(st.agents&&st.agents.length>0)AG=st.agents;if(st.deptAssignments)GEO.features.forEach(function(f){var c=f.properties.code;if(c in st.deptAssignments)f.properties.agent=st.deptAssignments[c]});return true}}catch(e){}return false}

function upd(){
    var at={};var ad={};var ats={};var upot=0,uc=0;
    GEO.features.forEach(function(f){var a=f.properties.agent;var pot=f.properties.potential||0;var sal=f.properties.sales2025||0;if(a===null||a===undefined){upot+=pot;uc++;return}if(!at[a]){at[a]=0;ad[a]=0;ats[a]=0}at[a]+=pot;ad[a]++;ats[a]+=sal});
    var tP=Object.values(at).reduce(function(s,v){return s+v},0)+upot;var tS=Object.values(ats).reduce(function(s,v){return s+v},0);var tR=tP>0?Math.round(tS/tP*100):0;
    document.getElementById('total-pot').textContent=fmt(Math.round(tP))+' EUR';
    document.getElementById('total-sales').textContent=fmt(Math.round(tS))+' EUR';
    document.getElementById('total-ratio').textContent=tR+'%';
    document.getElementById('agent-count').textContent=AG.length+' agents';
    var ur=document.getElementById('ur');
    if(uc>0){ur.style.display='flex';document.getElementById('up').textContent=fmt(Math.round(upot))+' EUR ('+uc+' depts)'}else{ur.style.display='none'}
    var c=document.getElementById('ac');c.innerHTML='';
    AG.forEach(function(agent){var p=at[agent.id]||0;var n=ad[agent.id]||0;var sa=ats[agent.id]||0;var ra=p>0?Math.round(sa/p*100):0;var s=sel===agent.id;var ie=ed===agent.id;
        var card=document.createElement('div');card.className='card'+(s?' sel':'');card.style.borderLeftColor=agent.color;
        var dot=document.createElement('div');dot.className='dot';dot.style.background=agent.color;
        var info=document.createElement('div');info.className='info';
        var name=document.createElement('div');name.className='name';
        if(ie){var inp=document.createElement('input');inp.value=agent.name;inp.onkeydown=function(e){if(e.key==='Enter'){agent.name=inp.value.trim()||agent.name;ed=null;upd()}if(e.key==='Escape'){ed=null;upd()}};inp.onblur=function(){agent.name=inp.value.trim()||agent.name;ed=null;upd()};name.appendChild(inp);setTimeout(function(){inp.focus();inp.select()},10)}
        else{name.textContent=agent.name;name.onclick=function(e){e.stopPropagation();ed=agent.id;upd()}}
        var cnt=document.createElement('div');cnt.className='dept-count';cnt.textContent=n+' depts';info.appendChild(name);info.appendChild(cnt);
        var nums=document.createElement('div');nums.className='nums';nums.innerHTML='<div class="pot">'+fmt(Math.round(p))+' EUR</div><div class="sales">CA 2025: '+fmt(Math.round(sa))+' EUR</div><div class="ratio">'+ra+'%</div>';
        var del=document.createElement('button');del.className='del';del.textContent='X';del.onclick=function(e){e.stopPropagation();if(!confirm('Supprimer ?'))return;AG=AG.filter(function(a){return a.id!==agent.id});GEO.features.forEach(function(f){if(f.properties.agent===agent.id)f.properties.agent=null});if(sel===agent.id)sel=null;if(ed===agent.id)ed=null;upd()};
        card.appendChild(dot);card.appendChild(info);card.appendChild(nums);card.appendChild(del);
        card.onclick=function(e){if(e.target===card||e.target===dot||e.target.className==='pot'||e.target.className==='sales'||e.target.className==='ratio'||e.target.className==='nums'||e.target.className==='info'||e.target.className==='dept-count'){sel=(sel===agent.id)?null:agent.id;upd()}};c.appendChild(card)});
    GL.eachLayer(function(l){GL.resetStyle(l)})
}
function addAgent(){var nid=AG.length>0?Math.max.apply(null,AG.map(function(a){return a.id}))+1:0;var ci=nid%DEF_COL.length;AG.push({id:nid,name:'Agent '+(nid+1),color:DEF_COL[ci],sales:0});upd()}
function resetAll(){if(!confirm('Reinitialiser ?'))return;sel=null;ed=null;GEO.features.forEach(function(f){f.properties.agent=INIT[f.properties.code]});AG=JSON.parse(JSON.stringify(DEF_AG));upd()}
function doSave(){var da={};GEO.features.forEach(function(f){da[f.properties.code]=f.properties.agent});var st={agents:AG,deptAssignments:da,savedAt:new Date().toISOString()};localStorage.setItem('fillmed_map',JSON.stringify(st));document.getElementById('toast').textContent='Sauvegarde locale !';document.getElementById('toast').classList.add('show');setTimeout(function(){document.getElementById('toast').classList.remove('show')},1500)}
function doCopy(){var da={};GEO.features.forEach(function(f){da[f.properties.code]=f.properties.agent});var st={agents:AG,deptAssignments:da};var compressed=LZString.compressToEncodedURIComponent(JSON.stringify(st));var url=window.location.origin+window.location.pathname+'#'+compressed;navigator.clipboard.writeText(url).then(function(){document.getElementById('toast').textContent='Lien copie ! Partagez-le.';document.getElementById('toast').classList.add('show');setTimeout(function(){document.getElementById('toast').classList.remove('show')},2000)}).catch(function(){prompt('Copiez ce lien:',url)})}
</script>
</body>
</html>
